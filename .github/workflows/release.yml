name: Build and Release

on:
  push:
    tags:
      - 'v*release'

jobs:
  release:
    name: Build & Release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: AxelGizmos.exe
          - os: macos-latest
            platform: darwin/universal
            output: AxelGizmos.dmg
          - os: ubuntu-latest
            platform: linux/amd64
            output: AxelGizmos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: wails build -platform ${{ matrix.platform }} -ldflags "-s -w"

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |
          wails build -platform ${{ matrix.platform }} -ldflags "-s -w"
          # Create DMG
          hdiutil create -volname "AxelGizmos" -srcfolder "build/bin/AxelGizmos.app" -ov -format UDZO AxelGizmos.dmg

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: wails build -platform ${{ matrix.platform }} -ldflags "-s -w" -tags webkit2_41

      - name: Rename Windows Output
        if: matrix.os == 'windows-latest'
        run: mv build/bin/AxelGizmos.exe .

      - name: Rename Linux Output
        if: matrix.os == 'ubuntu-latest'
        run: mv build/bin/AxelGizmos .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.output }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
